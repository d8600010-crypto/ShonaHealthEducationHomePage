<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>孤狼型青少年</title>
<style>
body {
    font-family: "Noto Sans TC", sans-serif;
    margin: 0;
    background: #f7f9fb;
    color: #333;
}
.container {
    max-width: 800px;
    margin: auto;
    padding: 30px;
}
h1 {
    text-align: center;
}
.section {
    background: white;
    padding: 20px;
    margin: 20px 0;
    border-radius: 10px;
}
.cta {
    text-align: center;
    margin-top: 20px;
}
.cta a {
    background: #4A90E2;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🐺 孤狼型青少年</h1>
<p style="text-align:center;">「我不需要你們」</p>

<div class="section">
<h3>家長常看到的樣子</h3>
<ul>
<li>關門、不說話</li>
<li>避免互動</li>
<li>回應冷淡</li>
</ul>
</div>

<div class="section">
<h3>醫療觀點</h3>
<p>
這屬於青少年建立獨立自我的過程，是正常發展的一部分。
</p>
</div>

<div class="section">
<h3>孩子內心</h3>
<p>
我想要自己做決定，但其實仍然需要支持。
</p>
</div>

<div class="section">
<h3>家長建議</h3>
<ul>
<li>減少逼問</li>
<li>保持可接近性</li>
<li>維持基本規範</li>
</ul>
</div>

<div class="section">
<h3>何時需要注意</h3>
<ul>
<li>長期孤立</li>
<li>情緒低落</li>
<li>生活功能下降</li>
</ul>
</div>

<div class="cta">
<a href="#">預約評估</a>
</div>

</div>

</body>
</html>
